<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>站内搜索 | Musk Collective</title>
  <meta name="description" content="Musk Collective 站内搜索">
  <link rel="canonical" href="https://muskcollective.com/search.html">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔍</text></svg>">
  <style>
    .search-box {
      position: relative;
      max-width: 600px;
      margin: 0 auto;
    }
    .search-input {
      width: 100%;
      padding: 16px 20px;
      font-size: 1.1rem;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-input:focus {
      border-color: #6366f1;
    }
    .search-results {
      margin-top: 20px;
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 16px;
      display: none;
    }
    .search-hint {
      color: #64748b;
      font-size: 0.875rem;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <a href="/" class="logo">🧠 <span>Musk Collective</span></a>
      <nav>
        <a href="/">首页</a>
        <a href="/knowledge-base/">知识库</a>
        <a href="/reports/">报告</a>
        <a href="/about.html">关于</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="container">
      <h1 class="page-title">🔍 站内搜索</h1>
      <p class="page-description">搜索知识库、报告和策略内容</p>

      <div style="margin-top: 30px;">
        <div class="search-box">
          <input 
            type="text" 
            id="search-input" 
            class="search-input" 
            placeholder="输入关键词搜索... (至少 2 个字符)"
            autocomplete="off"
          >
          <p class="search-hint">试试搜索：套利、OpenClaw、Maker、风控</p>
        </div>

        <div id="search-results" class="search-results"></div>
      </div>

      <section style="margin-top: 50px;">
        <h2 style="font-size: 1.25rem; margin-bottom: 16px;">📂 热门分类</h2>
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px;">
          <a href="/knowledge-base/kol-strategies.html" style="text-decoration: none; color: inherit;">
            <div style="background: #f8fafc; padding: 16px; border-radius: 8px; text-align: center;">
              <div style="font-size: 1.5rem;">👤</div>
              <div style="font-size: 0.875rem; margin-top: 4px;">KOL 策略</div>
            </div>
          </a>
          <a href="/knowledge-base/aegis-system/" style="text-decoration: none; color: inherit;">
            <div style="background: #f8fafc; padding: 16px; border-radius: 8px; text-align: center;">
              <div style="font-size: 1.5rem;">🏗️</div>
              <div style="font-size: 0.875rem; margin-top: 4px;">系统架构</div>
            </div>
          </a>
          <a href="/knowledge-base/tools-resources.html" style="text-decoration: none; color: inherit;">
            <div style="background: #f8fafc; padding: 16px; border-radius: 8px; text-align: center;">
              <div style="font-size: 1.5rem;">🛠️</div>
              <div style="font-size: 0.875rem; margin-top: 4px;">工具资源</div>
            </div>
          </a>
          <a href="/reports/" style="text-decoration: none; color: inherit;">
            <div style="background: #f8fafc; padding: 16px; border-radius: 8px; text-align: center;">
              <div style="font-size: 1.5rem;">📈</div>
              <div style="font-size: 0.875rem; margin-top: 4px;">报告中心</div>
            </div>
          </a>
        </div>
      </section>
    </div>
  </main>

  <footer>
    <div class="container">
      <p>🧠 Musk Collective | AI 套利知识库</p>
    </div>
  </footer>

  <script src="/js/search.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      MuskCollective.initSearch('search-input', 'search-results');
      
      // 自动聚焦搜索框
      document.getElementById('search-input').focus();
    });
  </script>
</body>
</html>
