  <style>
    :root{--bg:#0b1020;--surface:rgba(18,25,45,.84);--text:#f5f7ff;--text-secondary:#9ba7c4;--border:rgba(162,182,255,.14);--accent:#6f7cff;--accent-2:#38d0ff;--shadow:0 20px 60px rgba(0,0,0,.35);--radius:22px;--max:1100px}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Inter,ui-sans-serif,system-ui,sans-serif;background:linear-gradient(180deg,#08101f 0%,#0b1020 100%);color:var(--text);line-height:1.6}

    nav{display:flex;gap:18px;flex-wrap:wrap}
    nav a{color:var(--text-secondary)}
    nav a:hover,nav a.active{color:var(--text)}
    main{padding:72px 0 48px}
    .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-top:24px}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:20px;box-shadow:var(--shadow)}
    .eyebrow{color:var(--accent-2);font-size:.8rem;text-transform:uppercase;letter-spacing:.1em}
    .card h3{margin-top:10px;font-size:1.05rem}
    .card p{margin-top:8px;color:var(--text-secondary)}
    @media(max-width:760px){.grid{grid-template-columns:1fr}}
