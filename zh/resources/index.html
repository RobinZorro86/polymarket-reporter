<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>资源中心 | pred101</title>
  <meta name="description" content="pred101 资源中心：工具、API、术语表与风险管理参考。">
  <link rel="canonical" href="https://www.pred101.com/zh/resources/">
  <link rel="alternate" hreflang="zh" href="https://www.pred101.com/zh/resources/">
  <link rel="alternate" hreflang="en" href="https://www.pred101.com/en/resources/">
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/redesign.css">
  <style>
    h1 { font-family: var(--font-display); font-style: italic; }
    .card h3 { font-family: var(--font-body); font-weight: 600; letter-spacing: -0.02em; }
    .card p  { color: var(--text-secondary); font-size: 0.95rem; }
    .tag { font-family: var(--font-mono); font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent-cyan); }
    .card .icon { font-size: 1.7rem; margin-bottom: 14px; }
    /* Entrance animations */
    .hero-eyebrow { animation: fade-up 0.5s ease-out both; }
    .hero h1      { animation: fade-up 0.5s 0.10s ease-out both; }
    .lead         { animation: fade-up 0.5s 0.18s ease-out both; }
    .notice       { animation: fade-up 0.5s 0.26s ease-out both; }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="/zh/" class="logo"><span class="logo-mark">pred101</span> · 预测市场入门</a>
      <nav class="site-nav">
        <a href="/zh/">首页</a>
        <a href="/zh/learn/">7 天路径</a>
        <a href="/zh/strategies/">策略</a>
        <a href="/zh/kol/">KOL 研究</a>
        <a href="/zh/resources/" class="active">资源</a>
        <div class="lang-switch">
          <a href="/zh/resources/" class="active">中文</a>
          <a href="/en/resources/">English</a>
        </div>
      </nav>
    </div>
  </header>

  <main>
    <div class="container" style="padding-top:78px;padding-bottom:54px;">
      <div class="hero-eyebrow">资源中心 · 工具与参考</div>
      <h1 class="hero-title">使用少量可靠的工具。</h1>
      <p class="hero-lead">这个部分的目的不是让工具栈看起来令人印象深刻。它的存在是为了保持工作流稳定：数据输入、新闻输入、报告输出、决策记录。</p>
      <div class="notice">中文资源层保持简洁。目标是清晰优先，然后扩展。</div>
    </div>

    <section class="section">
      <div class="container">
        <div class="grid-2">
          <a class="card animate-on-scroll delay-1" href="/zh/knowledge-base/resources/">
            <div class="tag">目录</div>
            <h3 class="card-title">资源索引</h3>
            <p class="card-desc">API、术语表、风险管理、工具。</p>
          </a>
          <a class="card animate-on-scroll delay-2" href="/zh/knowledge-base/">
            <div class="tag">知识库</div>
            <h3 class="card-title">完整知识库</h3>
            <p class="card-desc">策略、教程、KOL 研究、报告。</p>
          </a>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>pred101.com · 资源层</p>
    </div>
  </footer>

  <!-- Scroll-triggered animation JS -->
  <script>
    (function() {
      var els = document.querySelectorAll('.animate-on-scroll');
      if (!els.length) return;
      var io = new IntersectionObserver(function(entries) {
        entries.forEach(function(e) {
          if (e.isIntersecting) { e.target.classList.add('is-visible'); io.unobserve(e.target); }
        });
      }, { threshold: 0.12 });
      els.forEach(function(el) { io.observe(el); });
    })();
  </script>
</body>
</html>
